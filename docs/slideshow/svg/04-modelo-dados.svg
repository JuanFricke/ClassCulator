<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <filter id="shadow" x="-4%" y="-8%" width="108%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect x="0" y="0" width="1920" height="8" fill="#2563eb"/>

  <text x="960" y="95" text-anchor="middle" font-family="system-ui,Segoe UI,Arial,sans-serif" font-size="56" font-weight="700" fill="#0f172a">Modelo de dados</text>
  <text x="960" y="155" text-anchor="middle" font-family="system-ui,Segoe UI,Arial,sans-serif" font-size="32" fill="#64748b">entidades principais</text>

  <g filter="url(#shadow)" font-family="system-ui,Segoe UI,Arial,sans-serif">
    <rect x="80" y="220" width="400" height="150" rx="16" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
    <text x="280" y="295" text-anchor="middle" font-size="40" font-weight="700" fill="#1e3a8a">Professor</text>
    <text x="280" y="345" text-anchor="middle" font-size="28" fill="#334155">nome &#183; disponibilidade</text>

    <rect x="80" y="400" width="400" height="130" rx="16" fill="#ffedd5" stroke="#ea580c" stroke-width="3"/>
    <text x="280" y="475" text-anchor="middle" font-size="40" font-weight="700" fill="#9a3412">Disciplina</text>
    <text x="280" y="520" text-anchor="middle" font-size="28" fill="#334155">carga_semanal &#183; ensino</text>

    <rect x="80" y="560" width="400" height="150" rx="16" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
    <text x="280" y="635" text-anchor="middle" font-size="40" font-weight="700" fill="#166534">Turma</text>
    <text x="280" y="685" text-anchor="middle" font-size="28" fill="#334155">slots_por_dia [5 inteiros]</text>

    <rect x="80" y="740" width="400" height="120" rx="16" fill="#f1f5f9" stroke="#475569" stroke-width="3"/>
    <text x="280" y="810" text-anchor="middle" font-size="40" font-weight="700" fill="#1e293b">Sala</text>

    <rect x="540" y="480" width="460" height="140" rx="16" fill="#f3e8ff" stroke="#9333ea" stroke-width="3"/>
    <text x="770" y="545" text-anchor="middle" font-size="38" font-weight="700" fill="#6b21a8">TurmaDisciplina</text>
    <text x="770" y="595" text-anchor="middle" font-size="28" fill="#334155">curr&#237;culo (turma + disc + prof)</text>

    <rect x="1100" y="220" width="420" height="130" rx="16" fill="#fce7f3" stroke="#db2777" stroke-width="3"/>
    <text x="1310" y="295" text-anchor="middle" font-size="40" font-weight="700" fill="#9d174d">GradeHoraria</text>

    <rect x="1100" y="400" width="480" height="160" rx="16" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
    <text x="1340" y="475" text-anchor="middle" font-size="40" font-weight="700" fill="#1e3a8a">AlocacaoSlot</text>
    <text x="1340" y="525" text-anchor="middle" font-size="28" fill="#334155">turma &#183; disciplina &#183; professor</text>
    <text x="1340" y="565" text-anchor="middle" font-size="28" fill="#334155">sala &#183; dia &#183; slot</text>

    <rect x="1100" y="640" width="740" height="320" rx="20" fill="#ffffff" stroke="#cbd5e1" stroke-width="3"/>
    <text x="1470" y="720" text-anchor="middle" font-size="38" font-weight="700" fill="#0f172a">V&#237;nculos</text>
    <text x="1470" y="780" text-anchor="middle" font-size="30" fill="#334155">ProfessorDisciplina (quem leciona o qu&#234;)</text>
    <text x="1470" y="835" text-anchor="middle" font-size="30" fill="#334155">DisponibilidadeProfessor (5&#215;8)</text>
    <text x="1470" y="900" text-anchor="middle" font-size="32" font-weight="600" fill="#b45309">UNIQUE (turma_id, disciplina_id)</text>
  </g>

  <g stroke="#94a3b8" stroke-width="3" fill="none">
    <line x1="480" y1="295" x2="540" y2="550"/>
    <line x1="280" y1="530" x2="540" y2="530"/>
    <line x1="480" y1="635" x2="540" y2="560"/>
    <line x1="1000" y1="550" x2="1100" y2="480"/>
    <line x1="1310" y1="350" x2="1310" y2="400"/>
  </g>

  <text x="960" y="1020" text-anchor="middle" font-family="system-ui,Segoe UI,Arial,sans-serif" font-size="30" fill="#64748b">Carga alvo da turma = sum(slots_por_dia) &#183; uma disciplina por turma no curr&#237;culo</text>
</svg>
