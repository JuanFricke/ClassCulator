<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}ClassCulator{% endblock %}</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css"
    />
    <link rel="stylesheet" href="/static/css/custom.css" />
  </head>
  <body>
    <nav class="navbar is-dark" role="navigation" aria-label="main navigation">
      <div class="container">
        <div class="navbar-brand">
          <a class="navbar-item has-text-weight-bold" href="/">
            ClassCulator
          </a>
        </div>
        <div class="navbar-menu is-active">
          <div class="navbar-start">
            <a class="navbar-item {% if active == 'home' %}is-active has-text-info{% endif %}" href="/">Início</a>
            <a class="navbar-item {% if active == 'professores' %}is-active has-text-info{% endif %}" href="/professores">Professores</a>
            <a class="navbar-item {% if active == 'turmas' %}is-active has-text-info{% endif %}" href="/turmas">Turmas</a>
            <a class="navbar-item {% if active == 'disciplinas' %}is-active has-text-info{% endif %}" href="/disciplinas">Disciplinas</a>
            <a class="navbar-item {% if active == 'salas' %}is-active has-text-info{% endif %}" href="/salas">Salas</a>
            <a class="navbar-item {% if active == 'grade' %}is-active has-text-info{% endif %}" href="/grade">Grades</a>
          </div>
          <div class="navbar-end">
            <a class="navbar-item" href="/docs" target="_blank">API docs</a>
          </div>
        </div>
      </div>
    </nav>

    <main class="section">
      <div class="container">
        {% block content %}{% endblock %}
      </div>
    </main>

    <footer class="footer">
      <div class="content has-text-centered">
        <p>
          <strong>ClassCulator</strong> — Sistema de Geração Automática de Grade Horária
          (UNIJUÍ · Ciência da Computação · EI 03 / 2026).
        </p>
      </div>
    </footer>

    <script src="/static/js/app.js" defer></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
